name: Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  engine:
    name: Engine
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run smoke tool
        run: ./build/tools/engine-smoke/vibe_othello_engine_smoke
