name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure WASM module
        run: >
          emcmake cmake -S . -B build-wasm
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DVIBE_OTHELLO_BUILD_WASM_MODULE=ON

      - name: Build WASM module
        run: cmake --build build-wasm --target vibe_othello_wasm_module

      - name: Copy WASM runtime assets
        run: cmake --build build-wasm --target vibe_othello_copy_web_wasm_assets

      - name: Copy eval artifact assets
        run: cmake --build build-wasm --target vibe_othello_copy_web_eval_artifact_assets

      - name: Test WASM build
        run: ctest --test-dir build-wasm --output-on-failure

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck web app
        working-directory: apps/web
        run: npm run typecheck

      - name: Build web app
        working-directory: apps/web
        run: npm exec vite -- build

      - name: Check Pages artifact contents
        run: |
          test -f apps/web/dist/index.html
          test -f apps/web/dist/wasm/vibe_othello_wasm_module.mjs
          test -f apps/web/dist/wasm/vibe_othello_wasm_module.wasm
          python3 cmake/web/copy_default_eval_artifact.py \
            --source-dir data/eval \
            --destination-dir apps/web/dist/eval \
            --check-only

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
